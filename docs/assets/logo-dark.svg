<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: sapphire to lavender -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="40%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>

    <!-- Accent gradient: teal to sapphire -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>

    <!-- Icon gradient: vertical for the mark -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#89dceb"/>
      <stop offset="50%" stop-color="#74c7ec"/>
      <stop offset="100%" stop-color="#89b4fa"/>
    </linearGradient>

    <!-- Subtle glow for the logomark -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#74c7ec" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#74c7ec" opacity="0.04"/>

    <!-- Toolkit Wave — flowing sine wave across the hex -->
    <path d="M 30 70 C 42 45, 55 45, 67 70 C 79 95, 92 95, 104 70 C 116 45, 125 45, 132 60"
          stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>

    <!-- Secondary subtle wave — offset, represents breadth of toolkit -->
    <path d="M 28 78 C 40 55, 53 55, 65 78 C 77 101, 90 101, 102 78 C 114 55, 123 55, 130 68"
          stroke="url(#g2)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.3"/>

    <!-- Tool dots positioned along the wave at different phases -->
    <circle cx="30" cy="70" r="3.5" fill="url(#g3)" opacity="0.85"/>
    <circle cx="30" cy="70" r="1.5" fill="#1e1e2e"/>

    <circle cx="49" cy="52" r="3" fill="#94e2d5" opacity="0.75"/>
    <circle cx="49" cy="52" r="1.3" fill="#1e1e2e"/>

    <circle cx="67" cy="70" r="3.5" fill="#74c7ec" opacity="0.8"/>
    <circle cx="67" cy="70" r="1.5" fill="#1e1e2e"/>

    <circle cx="86" cy="88" r="3" fill="#89b4fa" opacity="0.75"/>
    <circle cx="86" cy="88" r="1.3" fill="#1e1e2e"/>

    <circle cx="104" cy="70" r="3.5" fill="#b4befe" opacity="0.8"/>
    <circle cx="104" cy="70" r="1.5" fill="#1e1e2e"/>

    <circle cx="122" cy="52" r="3" fill="#89dceb" opacity="0.7"/>
    <circle cx="122" cy="52" r="1.3" fill="#1e1e2e"/>

    <!-- Subtle particle dots between tool nodes -->
    <circle cx="39" cy="58" r="1.2" fill="#94e2d5" opacity="0.4"/>
    <circle cx="58" cy="58" r="1.5" fill="#74c7ec" opacity="0.5"/>
    <circle cx="76" cy="82" r="1.2" fill="#89b4fa" opacity="0.4"/>
    <circle cx="95" cy="82" r="1.5" fill="#b4befe" opacity="0.5"/>
    <circle cx="113" cy="58" r="1.2" fill="#89dceb" opacity="0.4"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#89dceb" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#89b4fa" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "REAL-FRUIT-SNACKS" — clean, bold, wide-tracked (smaller for long name) -->
  <text x="430" y="105"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="36" font-weight="800" letter-spacing="10"
        fill="url(#g1)" text-anchor="middle">REAL-FRUIT-SNACKS</text>

  <!-- Thin separator line -->
  <line x1="270" y1="122" x2="590" y2="122"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline — refined, subtle -->
  <text x="430" y="146"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">WATER-THEMED SECURITY TOOLKIT</text>

  <!-- Version / descriptor — very subtle -->
  <text x="430" y="166"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">34 TOOLS · OFFENSE · RESEARCH · PRODUCTIVITY</text>
</svg>
